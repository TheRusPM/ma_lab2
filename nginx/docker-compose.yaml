version: "3.8"

services:
  nginx:
    image: nginx:stable-alpine
    container_name: gateway_nginx
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - lab2-net
    restart: unless-stopped

networks:
  lab2-net:
    external: true
