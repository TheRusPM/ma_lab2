version: '3.8'
services:
  service1:
    build: ./service1
    container_name: svc_service1
    environment:
      - SERVICE_NAME=Service-1
      - PORT=3000
    expose:
      - '3000'

  service2:
    build: ./service2
    container_name: svc_service2
    environment:
      - SERVICE_NAME=Service-2
      - PORT=3000
    expose:
      - '3000'

  nginx:
    image: nginx:stable-alpine
    container_name: gateway_nginx
    ports:
      - '80:80'
    depends_on:
      - service1
      - service2
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
